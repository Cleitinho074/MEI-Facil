<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MEI Fácil — Gestão Simplificada</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#1B4F72;--blue-l:#2E86C1;--blue-x:#D6EAF8;
  --green:#1E8449;--green-l:#27AE60;--green-x:#D5F5E3;
  --red:#C0392B;--red-l:#E74C3C;--red-x:#FADBD8;
  --amber:#D68910;--amber-x:#FEF9E7;
  --purple:#7D3C98;--purple-x:#F5EEF8;
  --bg:#F0F4F8;--card:#FFFFFF;--text:#2C3E50;--muted:#6C7A89;
  --border:#DDE3EA;--shadow:0 2px 12px rgba(0,0,0,.08);--radius:10px;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6}
a{color:var(--blue-l);text-decoration:none}

/* Layout */
.app{display:flex;min-height:100vh}
.sidebar{width:220px;background:var(--blue);color:#fff;display:flex;flex-direction:column;flex-shrink:0;transition:width .25s ease}
.sidebar.collapsed{width:60px}
.logo{padding:20px 16px;font-size:18px;font-weight:700;white-space:nowrap;overflow:hidden;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.15)}
.logo-icon{font-size:22px;flex-shrink:0}
.logo-text,.nav-label{transition:opacity .2s}
.sidebar.collapsed .logo-text,.sidebar.collapsed .nav-label{opacity:0;width:0}
.nav{flex:1;padding:12px 0}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 18px;cursor:pointer;font-size:14px;white-space:nowrap;overflow:hidden;border-left:3px solid transparent;transition:background .15s,border-color .15s}
.nav-item:hover{background:rgba(255,255,255,.1)}
.nav-item.active{background:rgba(255,255,255,.15);border-left-color:#fff;font-weight:600}
.nav-icon{font-size:18px;flex-shrink:0}
.collapse-btn{padding:14px 18px;cursor:pointer;font-size:18px;border-top:1px solid rgba(255,255,255,.15);text-align:center}
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-title{font-size:18px;font-weight:700}
.topbar-right{display:flex;align-items:center;gap:12px}
.user-badge{background:var(--blue);color:#fff;border-radius:50%;width:34px;height:34px;display:grid;place-items:center;font-weight:700;font-size:13px;cursor:pointer}
.content{padding:24px;flex:1}

/* Cards */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.card{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)}
.card-metric{display:flex;flex-direction:column;gap:4px}
.card-label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.card-value{font-size:26px;font-weight:700}
.card-sub{font-size:12px;color:var(--muted);margin-top:2px}
.card-icon{font-size:28px;margin-bottom:8px}
.green{color:var(--green-l)}.red{color:var(--red-l)}.blue{color:var(--blue-l)}.amber{color:var(--amber)}.purple{color:var(--purple)}

/* MEI limit */
.limit-card{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);margin-bottom:24px}
.limit-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.limit-title{font-weight:700;font-size:15px}
.limit-pct{font-size:22px;font-weight:700}
.progress-track{background:var(--border);border-radius:99px;height:14px;overflow:hidden}
.progress-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--green-l),var(--blue-l));transition:width .6s ease}
.progress-fill.warning{background:linear-gradient(90deg,var(--amber),#E67E22)}
.progress-fill.danger{background:linear-gradient(90deg,var(--red-l),#C0392B)}
.limit-info{display:flex;justify-content:space-between;margin-top:8px;font-size:12px;color:var(--muted);flex-wrap:wrap;gap:4px}
.alert-box{background:var(--red-x);border:1px solid var(--red-l);border-radius:8px;padding:12px 16px;margin-top:12px;font-size:13px;color:var(--red);display:flex;align-items:center;gap:8px}
.alert-amber{background:var(--amber-x);border-color:var(--amber);color:var(--amber)}

/* Tables */
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.section-title{font-size:16px;font-weight:700}
.table-wrap{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:520px}
th{background:var(--bg);padding:11px 16px;text-align:left;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
td{padding:12px 16px;border-bottom:1px solid var(--border);font-size:14px}
tr:last-child td{border-bottom:none}
tr:hover td{background:#F7FAFC}
.badge{display:inline-flex;align-items:center;padding:2px 10px;border-radius:99px;font-size:12px;font-weight:600}
.badge-green{background:var(--green-x);color:var(--green)}
.badge-red{background:var(--red-x);color:var(--red)}
.badge-blue{background:var(--blue-x);color:var(--blue)}
.badge-amber{background:var(--amber-x);color:var(--amber)}
.badge-purple{background:var(--purple-x);color:var(--purple)}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:opacity .15s,transform .1s}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--blue-l);color:#fff}
.btn-primary:hover,.btn-success:hover,.btn-danger:hover{opacity:.9}
.btn-success{background:var(--green-l);color:#fff}
.btn-danger{background:var(--red-l);color:#fff}
.btn-ghost{background:transparent;color:var(--blue-l);border:1.5px solid var(--blue-l)}
.btn-sm{padding:5px 12px;font-size:13px}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;place-items:center;z-index:1000;padding:16px}
.modal-overlay.open{display:grid}
.modal{background:var(--card);border-radius:12px;padding:28px;width:100%;max-width:640px;max-height:92vh;overflow-y:auto}
.modal-wide{max-width:780px}
.modal-title{font-size:18px;font-weight:700;margin-bottom:20px}
.form-group{margin-bottom:16px}
label{display:block;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:5px}
input,select,textarea{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;transition:border-color .15s;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--blue-l)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;flex-wrap:wrap}

/* Calc box */
.calc-box{background:var(--blue-x);border-radius:10px;padding:16px;margin-top:8px}
.calc-row{display:flex;justify-content:space-between;font-size:13px;padding:3px 0}
.calc-row.total{font-weight:700;font-size:15px;border-top:1px solid var(--border);margin-top:6px;padding-top:8px}
.calc-green{background:var(--green-x)}

/* Sale items list */
.sale-items-list{border:1.5px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:12px}
.sale-item-row{display:grid;grid-template-columns:1fr 80px 100px 80px 36px;gap:8px;align-items:center;padding:10px 12px;border-bottom:1px solid var(--border);background:var(--card)}
.sale-item-row:last-child{border-bottom:none}
.sale-item-row:nth-child(even){background:#FAFBFD}
.sale-item-header{background:var(--bg)!important;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;padding:8px 12px!important}
.sale-item-add{padding:10px 12px;border-top:1px solid var(--border);background:var(--bg);display:flex;align-items:center;gap:8px}
.item-subtotal{font-weight:700;color:var(--green-l);font-size:13px;text-align:right}
.remove-item-btn{width:28px;height:28px;border-radius:6px;border:none;background:var(--red-x);color:var(--red);cursor:pointer;font-size:15px;display:grid;place-items:center;flex-shrink:0}
.remove-item-btn:hover{background:var(--red-l);color:#fff}

/* Payment method pills */
.pay-methods{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}
.pay-pill{padding:7px 14px;border-radius:8px;border:2px solid var(--border);background:var(--card);cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);transition:all .15s;display:flex;align-items:center;gap:6px}
.pay-pill.active{border-color:var(--blue-l);background:var(--blue-x);color:var(--blue)}
.pay-pill.active.green-pay{border-color:var(--green-l);background:var(--green-x);color:var(--green)}
.fee-row{background:var(--amber-x);border:1px solid var(--amber);border-radius:8px;padding:10px 14px;font-size:13px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}

/* Bar chart */
.bar-chart{display:flex;align-items:flex-end;gap:8px;height:120px;padding:0 4px}
.bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;justify-content:flex-end}
.bar-col{width:100%;border-radius:6px 6px 0 0;transition:height .4s ease;min-height:4px}
.bar-label{font-size:10px;color:var(--muted)}
.bar-val{font-size:11px;font-weight:600}

/* Tabs */
.tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--bg);border-radius:8px;padding:4px;flex-wrap:wrap}
.tab{padding:7px 16px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;color:var(--muted);transition:background .15s,color .15s}
.tab.active{background:var(--card);color:var(--blue-l);box-shadow:0 1px 4px rgba(0,0,0,.1)}

/* History/audit */
.history-entry{border-left:3px solid var(--blue-l);padding:8px 14px;margin-bottom:8px;background:var(--bg);border-radius:0 8px 8px 0;font-size:13px}
.history-entry.edit{border-color:var(--amber)}
.history-entry.create{border-color:var(--green-l)}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;z-index:2000;background:var(--text);color:#fff;padding:12px 20px;border-radius:10px;font-size:14px;font-weight:600;box-shadow:var(--shadow);transform:translateY(80px);opacity:0;transition:all .3s ease;display:flex;align-items:center;gap:8px}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{background:var(--green)}
.toast.error{background:var(--red)}

/* Auth */
.auth-page{min-height:100vh;display:grid;place-items:center;background:linear-gradient(135deg,var(--blue) 0%,var(--blue-l) 100%);padding:16px}
.auth-card{background:var(--card);border-radius:16px;padding:40px;width:100%;max-width:400px}
.auth-logo{text-align:center;margin-bottom:28px}
.auth-logo-icon{font-size:48px;display:block;margin-bottom:8px}
.auth-logo-title{font-size:24px;font-weight:700;color:var(--blue)}
.auth-logo-sub{font-size:13px;color:var(--muted)}
.auth-btn{width:100%;padding:12px;font-size:16px}

/* Stock badge */
.stock-low{color:var(--red);font-weight:700}
.stock-ok{color:var(--green-l)}

@media(max-width:768px){
  .sidebar{width:0;position:fixed;height:100%;z-index:500;overflow:hidden}
  .sidebar.mobile-open{width:220px}
  .form-row,.form-row-3{grid-template-columns:1fr}
  .cards-grid{grid-template-columns:1fr 1fr}
  .topbar{padding:12px 16px}
  .content{padding:16px}
  .hide-mobile{display:none}
  .sale-item-row{grid-template-columns:1fr 60px 80px 70px 32px;gap:4px;padding:8px}
}
@media(max-width:480px){
  .cards-grid{grid-template-columns:1fr}
  .pay-pill{font-size:12px;padding:6px 10px}
}
</style>
</head>
<body>

<div id="auth-page" class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="auth-logo-icon">🏪</span>
      <div class="auth-logo-title">MEI Fácil</div>
      <div class="auth-logo-sub">Gestão simples para o seu negócio</div>
    </div>
    <div id="auth-tab-bar" class="tabs" style="margin-bottom:24px">
      <div class="tab active" onclick="switchAuth('login')">Entrar</div>
      <div class="tab" onclick="switchAuth('register')">Cadastrar</div>
    </div>
    <div id="auth-login">
      <div class="form-group"><label>E-mail</label><input type="email" id="login-email" placeholder="seu@email.com"/></div>
      <div class="form-group"><label>Senha</label><input type="password" id="login-pass" placeholder="••••••••"/></div>
      <button class="btn btn-primary auth-btn" onclick="doLogin()">Entrar na conta</button>
      <p style="text-align:center;margin-top:14px;font-size:13px;color:var(--muted)"><a href="#" onclick="demoLogin()">🎯 Entrar com conta demo</a></p>
    </div>
    <div id="auth-register" style="display:none">
      <div class="form-group"><label>Nome completo</label><input type="text" id="reg-name" placeholder="João da Silva"/></div>
      <div class="form-group"><label>E-mail</label><input type="email" id="reg-email" placeholder="seu@email.com"/></div>
      <div class="form-group"><label>CPF/CNPJ</label><input type="text" id="reg-cpf" placeholder="000.000.000-00"/></div>
      <div class="form-group"><label>Senha</label><input type="password" id="reg-pass" placeholder="Mínimo 8 caracteres"/></div>
      <button class="btn btn-primary auth-btn" onclick="doRegister()">Criar conta grátis</button>
    </div>
  </div>
</div>

<div id="app" class="app" style="display:none">
  <nav class="sidebar" id="sidebar">
    <div class="logo"><span class="logo-icon">🏪</span><span class="logo-text">MEI Fácil</span></div>
    <div class="nav">
      <div class="nav-item active" onclick="navigate('dashboard')"><span class="nav-icon">📊</span><span class="nav-label">Dashboard</span></div>
      <div class="nav-item" onclick="navigate('clients')"><span class="nav-icon">👥</span><span class="nav-label">Clientes</span></div>
      <div class="nav-item" onclick="navigate('products')"><span class="nav-icon">📦</span><span class="nav-label">Produtos/Serviços</span></div>
      <div class="nav-item" onclick="navigate('sales')"><span class="nav-icon">🛒</span><span class="nav-label">Vendas</span></div>
      <div class="nav-item" onclick="navigate('cashflow')"><span class="nav-icon">💰</span><span class="nav-label">Fluxo de Caixa</span></div>
      <div class="nav-item" onclick="navigate('reports')"><span class="nav-icon">📈</span><span class="nav-label">Relatórios</span></div>
      <div class="nav-item" onclick="navigate('settings')"><span class="nav-icon">⚙️</span><span class="nav-label">Configurações</span></div>
    </div>
    <div class="collapse-btn" onclick="toggleSidebar()">‹</div>
  </nav>
  <div class="main">
    <header class="topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <span style="cursor:pointer;font-size:20px;display:none" id="menu-btn" onclick="toggleMobile()">☰</span>
        <span class="topbar-title" id="page-title">Dashboard</span>
      </div>
      <div class="topbar-right">
        <span id="topbar-date" style="font-size:13px;color:var(--muted)" class="hide-mobile"></span>
        <div class="user-badge" id="user-badge" onclick="navigate('settings')">J</div>
      </div>
    </header>
    <div class="content" id="content"></div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal-box"><div id="modal-content"></div></div>
</div>
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════
// STATE
// ══════════════════════════════════════
const MEI_LIMIT = 81000;

const PAY_METHODS = {
  dinheiro: { label:'Dinheiro',        icon:'💵', hasFee:false },
  pix:      { label:'PIX',             icon:'⚡', hasFee:true,  defaultFee:0 },
  debito:   { label:'Cartão Débito',   icon:'💳', hasFee:true,  defaultFee:1.5 },
  credito:  { label:'Cartão Crédito',  icon:'💳', hasFee:true,  defaultFee:2.99 },
  boleto:   { label:'Boleto',          icon:'📄', hasFee:false },
};

const state = {
  user: null,
  page: 'dashboard',
  sidebarCollapsed: false,
  payFees: { pix:0, debito:1.5, credito:2.99 }, // configurable fees %
  clients: [
    {id:1,name:'Maria Oliveira',cpf:'123.456.789-00',phone:'(67)99999-1111',email:'maria@email.com',city:'Campo Grande'},
    {id:2,name:'José Santos',cpf:'987.654.321-00',phone:'(67)98888-2222',email:'jose@email.com',city:'Dourados'},
    {id:3,name:'Ana Costa',cpf:'456.789.123-00',phone:'(67)97777-3333',email:'ana@email.com',city:'Três Lagoas'},
  ],
  products: [
    {id:1,name:'Coxinha',type:'product',cost:2.50,margin:120,price:5.50,unit:'un',stock:40},
    {id:2,name:'Pastel Grande',type:'product',cost:3.00,margin:133,price:7.00,unit:'un',stock:25},
    {id:3,name:'Refrigerante',type:'product',cost:3.50,margin:71,price:6.00,unit:'un',stock:30},
    {id:4,name:'Corte de Cabelo',type:'service',cost:15,margin:120,price:33,unit:'un',stock:null},
    {id:5,name:'Manicure',type:'service',cost:10,margin:100,price:20,unit:'un',stock:null},
    {id:6,name:'Escova Progressiva',type:'service',cost:50,margin:160,price:130,unit:'un',stock:null},
  ],
  sales: [
    {id:1,date:'2025-06-01',clientId:1,clientName:'Maria Oliveira',
     items:[{productId:4,name:'Corte de Cabelo',qty:1,unitPrice:33,cost:15,subtotal:33}],
     total:33,profit:18,status:'paid',payMethod:'dinheiro',feePct:0,feeValue:0,netTotal:33},
    {id:2,date:'2025-06-02',clientId:2,clientName:'José Santos',
     items:[{productId:5,name:'Manicure',qty:2,unitPrice:20,cost:10,subtotal:40}],
     total:40,profit:20,status:'paid',payMethod:'pix',feePct:0,feeValue:0,netTotal:40},
    {id:3,date:'2025-06-05',clientId:3,clientName:'Ana Costa',
     items:[
       {productId:1,name:'Coxinha',qty:2,unitPrice:5.50,cost:2.50,subtotal:11},
       {productId:2,name:'Pastel Grande',qty:3,unitPrice:7.00,cost:3.00,subtotal:21},
       {productId:3,name:'Refrigerante',qty:1,unitPrice:6.00,cost:3.50,subtotal:6},
     ],
     total:38,profit:22.5,status:'paid',payMethod:'credito',feePct:2.99,feeValue:1.14,netTotal:36.86},
    {id:4,date:'2025-06-08',clientId:1,clientName:'Maria Oliveira',
     items:[{productId:6,name:'Escova Progressiva',qty:1,unitPrice:130,cost:50,subtotal:130}],
     total:130,profit:80,status:'paid',payMethod:'debito',feePct:1.5,feeValue:1.95,netTotal:128.05},
    {id:5,date:'2025-06-10',clientId:2,clientName:'José Santos',
     items:[{productId:4,name:'Corte de Cabelo',qty:1,unitPrice:33,cost:15,subtotal:33}],
     total:33,profit:18,status:'pending',payMethod:'dinheiro',feePct:0,feeValue:0,netTotal:33},
  ],
  cashflow: [
    {id:1,date:'2025-06-01',desc:'Venda #1 — Corte de Cabelo',type:'in',value:33,saleId:1,editable:true,history:[]},
    {id:2,date:'2025-06-02',desc:'Fornecedor capilar',type:'out',value:120,editable:true,history:[]},
    {id:3,date:'2025-06-03',desc:'Aluguel',type:'out',value:600,editable:true,history:[]},
    {id:4,date:'2025-06-05',desc:'Venda #3 — 3 itens',type:'in',value:36.86,saleId:3,editable:true,history:[]},
    {id:5,date:'2025-06-08',desc:'Venda #4 — Escova Progressiva',type:'in',value:128.05,saleId:4,editable:true,history:[]},
    {id:6,date:'2025-06-09',desc:'DAS MEI mensal',type:'out',value:76,editable:true,history:[]},
    {id:7,date:'2025-06-10',desc:'Material de limpeza',type:'out',value:45,editable:true,history:[]},
  ],
  yearRevenue: 42750,
  revenueHistory: [
    {ts:'2025-06-01T10:00:00',action:'init',before:null,after:42750,reason:'Valor inicial do sistema',user:'Sistema'}
  ],
};

// ══════════════════════════════════════
// AUTH
// ══════════════════════════════════════
const API_URL = "https://mei-facil-production.up.railway.app";

function switchAuth(tab){
    document.getElementById('auth-login').style.display  = tab==='login'?'':'none';
    document.getElementById('auth-register').style.display = tab==='register'?'':'none';
    document.querySelectorAll('#auth-tab-bar .tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&tab==='login')||(i===1&&tab==='register')));
}

async function doLogin() {
    const e = document.getElementById('login-email').value;
    const p = document.getElementById('login-pass').value;
    
    if (!e || !p) return toast('Preencha e-mail e senha', 'error');
    
    try {
        const response = await fetch(`${API_URL}/api/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: e, password: p })
        });
        
        const data = await response.json();
        
        if (!response.ok) {
            return toast(data.error || 'Erro ao fazer login', 'error');
        }
        
        localStorage.setItem('mei_token', data.token);
        loginSuccess(data.user);
    } catch (error) {
        console.error(error);
        toast('Erro ao conectar com o servidor', 'error');
    }
}

function demoLogin() {

async function doRegister() {
    const n = document.getElementById('reg-name').value;
    const e = document.getElementById('reg-email').value;
    const p = document.getElementById('reg-pass').value;
    const c = document.getElementById('reg-cpf').value;
    
    if (!n || !e || !p) return toast('Preencha todos os campos', 'error');
    if (p.length < 8) return toast('Senha deve ter no mínimo 8 caracteres', 'error');
    
    try {
        const response = await fetch(`${API_URL}/api/auth/register`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: n, email: e, password: p, cpf: c })
        });
        
        const data = await response.json();
        
        if (!response.ok) {
            return toast(data.error || 'Erro ao criar conta', 'error');
        }
        
        localStorage.setItem('mei_token', data.token);
        loginSuccess(data.user);
    } catch (error) {
        console.error(error);
        toast('Erro ao conectar com o servidor', 'error');
    }
}

function loginSuccess(user){
    state.user = user;
    
    document.getElementById('auth-page').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    
    const userBadge = document.getElementById('user-badge');
    if (userBadge) {
        userBadge.textContent = user.initials || user.name.charAt(0).toUpperCase();
    }
    
    if (typeof updateTopbarDate === 'function') updateTopbarDate();
    
    if (typeof init === 'function') {
        init();
    } else if (typeof render === 'function') {
        render();
    }
    
    if (typeof navigate === 'function') {
        navigate('dashboard');
    } else if (typeof showPage === 'function') {
        showPage('dashboard');
    } else if (typeof changeTab === 'function') {
        changeTab('dashboard');
    }
    
    toast(`Bem-vindo(a), ${user.name.split(' ')[0]}! 👋`, 'success');
}

function logout(){
  localStorage.removeItem('mei_token');
  state.user=null;
  document.getElementById('app').style.display='none';
  document.getElementById('auth-page').style.display='grid';
}

(function(){
  const raw=localStorage.getItem('mei_token');
  if(!raw)return;
  try{const d=JSON.parse(atob(raw));if(d.exp>Date.now())loginSuccess(d.user);}catch(e){}
})();

const R=v=>'R$ '+(+v).toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.');
function fmt(d){return new Date(d+'T00:00:00').toLocaleDateString('pt-BR');}
function nowISO(){return new Date().toISOString();}
function updateTopbarDate(){
  const d=new Date();
  document.getElementById('topbar-date').textContent=d.toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'short',year:'numeric'});

font-size:14px;font-weight:600;box-shadow:var(--shadow);transform:translateY(80px);opacity:0;transition:all .3s ease;display:flex;align-items:center;gap:8px}
function toast(msg,type='success'){
  const el=document.getElementById('toast');
  el.textContent=(type==='success'?'✅ ':type==='error'?'❌ ':'ℹ️ ')+msg;
  el.className='toast show '+type;
  clearTimeout(el._t);
  el._t=setTimeout(()=>el.classList.remove('show'),3500);
}
function openModal(html,wide=false){
  document.getElementById('modal-box').className='modal'+(wide?' modal-wide':'');
  document.getElementById('modal-content').innerHTML=html;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(e){
  if(e&&e.target!==document.getElementById('modal-overlay'))return;
  document.getElementById('modal-overlay').classList.remove('open');
}
function _closeModal(){closeModal({target:document.getElementById('modal-overlay')});}
function payIcon(m){return PAY_METHODS[m]?.icon||'💳';}
function payLabel(m={}){return PAY_METHODS[m]?.label||m;}

function renderDashboard(el){
  const paidSales=state.sales.filter(s=>s.status==='paid');

  const totalProfit=paidSales.reduce((a,s)=>a+s.profit,0);
  const totalOut=state.cashflow.filter(c=>c.type==='out').reduce((a,c)=>a+c.value,0);
  const totalIn=state.cashflow.filter(c=>c.type==='in').reduce((a,c)=>a+c.value,0);
  const pct=Math.min(100,(state.yearRevenue/MEI_LIMIT)*100);
  const remaining=MEI_LIMIT-state.yearRevenue;
  const alertClass=pct>=90?'danger':pct>=75?'warning':'';
  const alertMsg=pct>=90
    ?`⚠️ ATENÇÃO: Você está a apenas ${R(remaining)} do limite MEI. Consulte um contador urgentemente.`
    :pct>=75?`🔔 Atenção: Você atingiu ${pct.toFixed(0)}% do limite anual. Fique atento.`:'';
  const months=['Jan','Fev','Mar','Abr','Mai','Jun'];
  const vals=[5200,6800,4900,7200,8100,totalRevenue];
  const maxVal=Math.max(...vals);

  // Payment method breakdown
  const payBreakdown={};
  paidSales.forEach(s=>{payBreakdown[s.payMethod]=(payBreakdown[s.payMethod]||0)+s.netTotal;});
  const totalFees=paidSales.reduce((a,s)=>a+s.feeValue,0);

  el.innerHTML=`
    <div class="limit-card">
      <div class="limit-header">
        <span class="limit-title">🏛️ Limite Anual MEI 2025</span>

        <span>Faturado: <strong>${R(state.yearRevenue)}</strong></span>
        <span>Limite: <strong>${R(MEI_LIMIT)}</strong></span>
        <span>Restante: <strong>${R(remaining)}</strong></span>
        <button class="btn btn-ghost btn-sm" onclick="openEditRevenueModal()" style="margin-left:auto">✏️ Corrigir faturamento</button>
      </div>
      ${alertMsg?`<div class="alert-box ${pct<90?'alert-amber':''}">${alertMsg}</div>`:''}
    </div>

    <div class="cards-grid">
      <div class="card card-metric"><div class="card-icon">💚</div><div class="card-label">Receita líquida (mês)</div><div class="card-value green">${R(totalRevenue)}</div><div class="card-sub">${paidSales.length} vendas pagas</div></div>
      <div class="card card-metric"><div class="card-icon">💙</div><div class="card-label">Lucro estimado (mês)</div><div class="card-value blue">${R(totalProfit)}</div><div class="card-sub">Margem: ${totalRevenue>0?(totalProfit/totalRevenue*100).toFixed(1):0}%</div></div>
      <div class="card card-metric"><div class="card-icon">❤️</div><div class="card-label">Despesas (mês)</div><div class="card-value red">${R(totalOut)}</div><div class="card-sub">${state.cashflow.filter(c=>c.type==='out').length} lançamentos</div></div>
      <div class="card card-metric"><div class="card-icon">🏧</div><div class="card-label">Taxas máquina (mês)</div><div class="card-value amber">${R(totalFees)}</div><div class="card-sub">Cobradas pelas operadoras</div></div>
    </div>

    <div style="display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:24px">
      <div class="card">
        <div class="section-header"><span class="section-title">📊 Faturamento — últimos 6 meses</span></div>
        <div class="bar-chart" id="bar-chart"></div>
      </div>
      <div class="card">
        <div class="section-title" style="margin-bottom:14px">💳 Por forma de pagamento</div>
        ${Object.entries(payBreakdown).map(([m,v])=>`
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:13px">
            <span>${payIcon(m)} ${payLabel(m)}</span>
            <strong>${R(v)}</strong>
          </div>`).join('')||'<span style="color:var(--muted);font-size:13px">Sem vendas ainda</span>'}

        <button class="btn btn-primary btn-sm" onclick="navigate('sales')" style="width:100%">+ Nova Venda</button>
      </div>
    </div>

    <div class="section-header">
      <span class="section-title">🛒 Últimas Vendas</span>
      <button class="btn btn-ghost btn-sm" onclick="navigate('sales')">Ver tudo</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Data</th><th>Cliente</th><th>Itens</th><th>Pagamento</th><th>Total líquido</th><th>Status</th></tr></thead>
        <tbody>
          ${[...state.sales].reverse().slice(0,5).map(s=>`
            <tr>
              <td>${fmt(s.date)}</td>
              <td>${s.clientName||'—'}</td>
              <td>${s.items.map(i=>`${i.qty}x ${i.name}`).join(', ')}</td>
              <td>${payIcon(s.payMethod)} ${payLabel(s.payMethod)}${s.feeValue>0?` <span style="color:var(--muted);font-size:11px">(-${R(s.feeValue)})</span>`:''}</td>

        <div class="bar-wrap">

  }

function openEditRevenueModal(){
  let hHtml = state.revenueHistory.map(h=>`
    <div class="history-entry ${h.action==='edit'?'edit':'create'}">
      <strong>${new Date(h.ts).toLocaleString('pt-BR')}</strong> - Motivo: <em>${h.reason}</em><br/>
      Alterou de <del>${R(h.before||0)}</del> para <strong>${R(h.after)}</strong> (por ${h.user})
    </div>`).join('');

  openModal(`
    <div class="modal-title">✏️ Corrigir Faturamento Acumulado (Ano)</div>
    <div class="form-group">
      <label>Valor atual acumulado faturado</label>
      <input type="number" step="0.01" id="rev-val" value="${state.yearRevenue}"/>
    </div>
    <div class="form-group">
      <label>Motivo da alteração / Ajuste</label>
      <input type="text" id="rev-reason" placeholder="Ex: Correção de notas emitidas em Jan, inserção retroativa..."/>
    </div>
    <div style="margin-top:12px; max-height:160px; overflow-y:auto; border:1px solid var(--border); padding:8px; border-radius:6px">
      <div style="font-size:12px; font-weight:600; color:var(--muted); margin-bottom:6px">📋 Histórico de Ajustes:</div>
      ${hHtml}
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="_closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveRevenueAdjustment()">Salvar Ajuste</button>
    </div>
  `);
}

function saveRevenueAdjustment(){
  const val = parseFloat(document.getElementById('rev-val').value);
  const reason = document.getElementById('rev-reason').value.trim();
  if(isNaN(val) || val < 0) return toast('Insira um valor válido','error');
  if(!reason) return toast('Insira o motivo do ajuste para fins de auditoria','error');

  state.revenueHistory.push({
    ts: nowISO(),
    action: 'edit',
    before: state.yearRevenue,
    after: val,
    reason: reason,
    user: state.user?.name || 'Usuário'
  });

  state.yearRevenue = val;
  _closeModal();
  renderPage(state.page);
  toast('Faturamento anual reajustado com sucesso!');
}

      <div class="form-group"><label>Margem (%)</label><input type="number" id="p-margin" value="${p.margin}" oninput="calcPriceByMargin()"/></div>
      <div class="form-group"><label>Preço Venda (R$) *</label><input type="number" step="0.01" id="p-price" value="${p.price}" oninput="calcMarginByPrice()"/></div>
    </div>

    </div>
  `);

function toggleStockField(v){ document.getElementById('stock-row').style.display=v==='service'?'none':''; }
function calcPriceByMargin(){
  const c = parseFloat(document.getElementById('p-cost').value)||0, m = parseFloat(document.getElementById('p-margin').value)||0;
  if(c>0) document.getElementById('p-price').value = (c * (1 + m/100)).toFixed(2);
}
function calcMarginByPrice(){
  const c = parseFloat(document.getElementById('p-cost').value)||0, p = parseFloat(document.getElementById('p-price').value)||0;
  if(c>0 && p>0) document.getElementById('p-margin').value = (((p - c) / c) * 100).toFixed(0);
}

function saveProduct(id){
  const n=document.getElementById('p-name').value.trim(), t=document.getElementById('p-type').value;
  const cost=parseFloat(document.getElementById('p-cost').value)||0, price=parseFloat(document.getElementById('p-price').value)||0;
  if(!n||cost<=0||price<=0) return toast('Preencha os campos obrigatórios corretamente','error');

  const payload={
    name:n, type:t, cost:cost, price:price,
    margin: parseInt(document.getElementById('p-margin').value)||0,
    unit: t==='product'?document.getElementById('p-unit').value:'un',
    stock: t==='product'?parseInt(document.getElementById('p-stock').value)||0:null
  };

  if(id){
    Object.assign(state.products.find(x=>x.id===id), payload);
    toast('Catálogo atualizado!');
  }else{
    payload.id = state.products.length ? Math.max(...state.products.map(x=>x.id))+1 : 1;
    state.products.push(payload);
    toast('Item inserido no catálogo!');
  }
  _closeModal();
  renderPage('products');
}

function deleteProduct(id){
  if(!confirm('Deseja excluir este item do catálogo?'))return;
  state.products=state.products.filter(x=>x.id!==id);
  renderPage('products');
  toast('Item excluído!','error');
}

function renderSales(el){
  el.innerHTML=`
    <div style="display:grid;grid-template-columns:1.2fr 1fr;gap:20px;align-items:start">
      <div class="card">
        <div class="section-title" style="margin-bottom:16px">🛒 Nova Venda / Orçamento</div>
        <div class="form-group">
          <label>Cliente (Opcional)</label>
          <select id="s-client">
            <option value="">— Consumidor final —</option>
            ${state.clients.map(c=>`<option value="${c.id}">${c.name} (${c.city})</option>`).join('')}
          </select>
        </div>
        
        <label>Produtos / Serviços no Carrinho</label>
        <div class="sale-items-list">
          <div class="sale-item-row sale-item-header">
            <div>Item</div><div>Qtd</div><div>Preço Un.</div><div>Subtotal</div><div></div>
          </div>
          <div id="cart-rows"></div>
          <div class="sale-item-add">
            <select id="cart-add-select" style="flex:2">
              <option value="">➕ Selecione um produto/serviço para adicionar...</option>
              ${state.products.map(p=>`<option value="${p.id}">${p.name} - ${R(p.price)} (${p.type==='product'?'Estoque: '+p.stock:'Serviço'})</option>`).join('')}
            </select>
            <input type="number" id="cart-add-qty" value="1" min="1" style="width:70px"/>
            <button class="btn btn-success btn-sm" onclick="addItemToCart()">Adicionar</button>
          </div>
        </div>
      </div>

      <div class="card calc-green">
        <div class="section-title" style="margin-bottom:16px">💳 Fechamento & Taxas Operadora</div>
        <label>Forma de Pagamento</label>
        <div class="pay-methods">
          ${Object.entries(PAY_METHODS).map(([k,m])=>`
            <div class="pay-pill ${k==='pix'||k==='debito'||k==='credito'?'green-pay':''} ${selectedPayMethod===k?'active':''}" onclick="setPayMethod('${k}')">
              ${m.icon} ${m.label}
            </div>`).join('')}
        </div>

        <div id="fee-info-box" style="margin-bottom:14px"></div>

        <div class="calc-box" style="background:#fff">
          <div class="calc-row"><span>Total Bruto dos Itens:</span><strong id="v-bruto">R$ 0,00</strong></div>
          <div class="calc-row" style="color:var(--red)"><span>Desconto taxas maquininha (<span id="v-fee-pct">0</span>%):</span><strong id="v-fee-val">- R$ 0,00</strong></div>
          <div class="calc-row total" style="color:var(--green)"><span>Total Líquido a Receber:</span><span id="v-liquido" style="font-size:20px">R$ 0,00</span></div>
        </div>

        <div class="form-row" style="margin-top:16px">
          <div class="form-group"><label>Data da Competência</label><input type="date" id="s-date" value="${nowISO().split('T')[0]}"/></div>
          <div class="form-group"><label>Status da Venda</label>
            <select id="s-status">
              <option value="paid">✅ Pago (Lança Caixa)</option>
              <option value="pending">⏳ Pendente / Orçamento</option>
            </select>
          </div>
        </div>

        <button class="btn btn-primary" style="width:100%;padding:12px;margin-top:10px" onclick="submitSale()">🚀 Concluir e Registrar Venda</button>
      </div>
    </div>

    <div class="section-header" style="margin-top:32px">
      <span class="section-title">📋 Histórico de Vendas Realizadas</span>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Data</th><th>Cliente</th><th>Itens faturados</th><th>Pagamento</th><th>Bruto</th><th>Líquido Caixa</th><th>Status</th><th>Ações</th></tr></thead>
        <tbody>
          ${[...state.sales].reverse().map(s=>`
            <tr>
              <td>${fmt(s.date)}</td>
              <td style="font-weight:600">${s.clientName||'<span style="color:var(--muted)">Consumidor final</span>'}</td>
              <td style="font-size:13px;max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${s.items.map(i=>`${i.qty}x ${i.name}`).join(', ')}">
                ${s.items.map(i=>`${i.qty}x ${i.name}`).join(', ')}
              </td>
              <td>${payIcon(s.payMethod)} ${payLabel(s.payMethod)} ${s.feeValue > 0 ? `<small style="color:var(--red)">(-${s.feePct}%)</small>`:''}</td>
              <td>${R(s.total)}</td>
              <td style="font-weight:600;color:var(--green-l)">${R(s.netTotal)}</td>
              <td><span class="badge ${s.status==='paid'?'badge-green':'badge-amber'}">${s.status==='paid'?'✅ Pago':'⏳ Pendente'}</span></td>
              <td>
                <button class="btn btn-danger btn-sm" onclick="deleteSale(${s.id})">🗑️</button>
              </td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>
  `;
  updateCartUI();
}

function setPayMethod(m){ selectedPayMethod=m; updateCartUI(); }

function addItemToCart(){
  const select = document.getElementById('cart-add-select');
  const pId = parseInt(select.value);
  const qty = parseInt(document.getElementById('cart-add-qty').value)||1;
  if(!pId) return toast('Selecione um item do catálogo','error');
  
  const prod = state.products.find(x=>x.id===pId);
  const existing = cart.find(x=>x.productId===pId);
  
  if(existing){
    existing.qty += qty;
    existing.subtotal = existing.qty * existing.unitPrice;
  }else{
    cart.push({
      productId: prod.id,
      name: prod.name,
      qty: qty,
      unitPrice: prod.price,
      cost: prod.cost,
      subtotal: qty * prod.price
    });
  }
  select.value = "";
  updateCartUI();
}

function removeCartItem(idx){ cart.splice(idx,1); updateCartUI(); }

function updateCartUI(){
  const container = document.getElementById('cart-rows');
  if(!container) return;

  if(cart.length===0){
    container.innerHTML = `<div style="text-align:center;padding:16px;color:var(--muted);font-size:13px">Carrinho vazio</div>`;
  }else{
    container.innerHTML = cart.map((item, idx)=>`
      <div class="sale-item-row">
        <div style="font-weight:600">${item.name}</div>
        <div><strong>${item.qty}</strong></div>
        <td>${R(item.unitPrice)}</td>
        <div class="item-subtotal">${R(item.subtotal)}</div>
        <div><button class="remove-item-btn" onclick="removeCartItem(${idx})">×</button></div>
      </div>`).join('');
  }

  // Calculate fields
  const totalBruto = cart.reduce((a,i)=>a+i.subtotal,0);
  const feePct = PAY_METHODS[selectedPayMethod].hasFee ? (state.payFees[selectedPayMethod]||0) : 0;
  const feeVal = totalBruto * (feePct / 100);
  const totalLiquido = totalBruto - feeVal;

  document.getElementById('v-bruto').textContent = R(totalBruto);
  document.getElementById('v-fee-pct').textContent = feePct;
  document.getElementById('v-fee-val').textContent = `- ${R(feeVal)}`;
  document.getElementById('v-liquido').textContent = R(totalLiquido);

  const feeBox = document.getElementById('fee-info-box');
  if(feePct>0){
    feeBox.innerHTML = `<div class="fee-row">🏧 Esta operadora cobra <strong>${feePct}%</strong> nesta modalidade. Desconto de <strong>${R(feeVal)}</strong> retido na fonte.</div>`;
  }else{
    feeBox.innerHTML = "";
  }

  // Update pills classes
  document.querySelectorAll('.pay-pill').forEach(el=>{
    const label = el.textContent.trim();
    el.classList.toggle('active', label.includes(PAY_METHODS[selectedPayMethod].label));
  });
}

function submitSale(){
  if(cart.length===0) return toast('Adicione pelo menos um item ao carrinho','error');
  const cId = parseInt(document.getElementById('s-client').value);
  const status = document.getElementById('s-status').value;
  const date = document.getElementById('s-date').value;

  const client = state.clients.find(x=>x.id===cId);
  const totalBruto = cart.reduce((a,i)=>a+i.subtotal,0);
  const totalCost = cart.reduce((a,i)=>(a+(i.cost * i.qty)),0);
  const feePct = PAY_METHODS[selectedPayMethod].hasFee ? (state.payFees[selectedPayMethod]||0) : 0;
  const feeVal = totalBruto * (feePct / 100);
  const totalLiquido = totalBruto - feeVal;
  const profit = totalLiquido - totalCost;

  const saleId = state.sales.length ? Math.max(...state.sales.map(x=>x.id))+1 : 1;

  const salePayload = {
    id: saleId,
    date: date,
    clientId: cId||null,
    clientName: client ? client.name : null,
    items: [...cart],
    total: totalBruto,
    profit: profit,
    status: status,
    payMethod: selectedPayMethod,
    feePct: feePct,
    feeValue: feeVal,
    netTotal: totalLiquido
  };

  state.sales.push(salePayload);

  if(status === 'paid'){
    state.cashflow.push({
      id: state.cashflow.length ? Math.max(...state.cashflow.map(x=>x.id))+1 : 1,
      date: date,
      desc: `Venda #${saleId} — ${cart.length===1?cart[0].name: cart.length+' itens'}`,
      type: 'in',
      value: totalLiquido,
      saleId: saleId,
      editable: true,
      history: []
    });
    state.yearRevenue += totalLiquido;
    
    // Deduct stock
    cart.forEach(item=>{
      const p = state.products.find(x=>x.id===item.productId);
      if(p && p.type==='product'){
        p.stock = Math.max(0, p.stock - item.qty);
      }
    });
  }

  cart = [];
  toast('Venda registrada e processada com sucesso!');
  renderPage('sales');
}

function deleteSale(id){
  if(!confirm('Deseja estornar e excluir esta venda? O faturamento anual e lançamentos vinculados no caixa serão recalculados.'))return;
  const sale = state.sales.find(x=>x.id===id);
  if(sale && sale.status==='paid'){
    state.yearRevenue -= sale.netTotal;
    state.cashflow = state.cashflow.filter(c=>c.saleId !== id);
    
    // Devolve o estoque
    sale.items.forEach(item=>{
      const p = state.products.find(x=>x.id===item.productId);
      if(p && p.type==='product'){
        p.stock += item.qty;
      }
    });
  }
  state.sales = state.sales.filter(x=>x.id!==id);
  renderPage('sales');
  toast('Venda removida e caixa estornado!','error');
}

// ══════════════════════════════════════
// CASH FLOW (FLUXO DE CAIXA COMPLETO COM AUDITORIA)
// ══════════════════════════════════════
function renderCashflow(el){
  const totalIn = state.cashflow.filter(c=>c.type==='in').reduce((a,c)=>a+c.value,0);
  const totalOut = state.cashflow.filter(c=>c.type==='out').reduce((a,c)=>a+c.value,0);
  const balance = totalIn - totalOut;

  el.innerHTML=`
    <div class="cards-grid">
      <div class="card card-metric"><div class="card-icon">📈</div><div class="card-label">Entradas Totais</div><div class="card-value green">${R(totalIn)}</div></div>
      <div class="card card-metric"><div class="card-icon">📉</div><div class="card-label">Saídas / Despesas</div><div class="card-value red">${R(totalOut)}</div></div>
      <div class="card card-metric"><div class="card-icon">⚖️</div><div class="card-label">Saldo em Caixa</div><div class="card-value ${balance>=0?'blue':'red'}">${R(balance)}</div></div>
    </div>

    <div class="section-header">
      <span class="section-title">💰 Livro Caixa de Lançamentos</span>
      <div style="display:flex;gap:10px">
        <button class="btn btn-success btn-sm" onclick="openCashflowModal('in')">+ Receita Direta</button>
        <button class="btn btn-danger btn-sm" onclick="openCashflowModal('out')">+ Despesa / Saída</button>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead><tr><th>Data</th><th>Descrição do Lançamento</th><th>Tipo</th><th>Valor Monetário</th><th>Ações</th></tr></thead>
        <tbody>
          ${[...state.cashflow].reverse().map(c=>`
            <tr>
              <td>${fmt(c.date)}</td>
              <td style="font-weight:600">
                ${c.desc} ${c.saleId ? `<small style="color:var(--muted)">(Faturamento #${c.saleId})</small>`:''}
              </td>
              <td><span class="badge ${c.type==='in'?'badge-green':'badge-red'}">${c.type==='in'?'📥 Entrada':'📤 Saída'}</span></td>
              <td style="font-weight:700;color:var(--${c.type==='in'?'green-l':'red-l'})">${c.type==='in'?'+':'-'} ${R(c.value)}</td>
              <td>
                <button class="btn btn-ghost btn-sm" onclick="openCashflowModal('${c.type}', ${c.id})">✏️</button>
                <button class="btn btn-danger btn-sm" onclick="deleteCashflow(${c.id})">🗑️</button>
              </td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function openCashflowModal(type, id=null){
  const c = id ? state.cashflow.find(x=>x.id===id) : {date:nowISO().split('T')[0], desc:'', value:''};
  
  let auditHistoryHtml = "";
  if(id && c.history && c.history.length > 0){
    auditHistoryHtml = `
      <div style="margin-top:14px; max-height:110px; overflow-y:auto; border:1px solid var(--border); padding:8px; border-radius:6px">
        <div style="font-size:11px; font-weight:600; color:var(--muted); margin-bottom:4px">📝 Histórico de Revisões Deste Lançamento:</div>
        ${c.history.map(h=>`<div class="history-entry edit" style="font-size:11px;padding:4px 8px"><strong>${new Date(h.ts).toLocaleString('pt-BR')}</strong>: Mudou de ${R(h.before)} p/ ${R(h.after)} (Motivo: ${h.reason})</div>`).join('')}
      </div>`;
  }

  openModal(`
    <div class="modal-title">${id?'✏️ Modificar Lançamento':'💰 Adicionar '+ (type==='in'?'Receita Direta':'Despesa / Saída')}</div>
    <div class="form-group"><label>Descrição / Histórico do Lançamento *</label><input type="text" id="fl-desc" value="${c.desc}"/></div>
    <div class="form-row">
      <div class="form-group"><label>Data</label><input type="date" id="fl-date" value="${c.date}"/></div>
      <div class="form-group"><label>Valor (R$) *</label><input type="number" step="0.01" id="fl-value" value="${c.value}"/></div>
    </div>
    ${id ? `<div class="form-group"><label>Justificativa do Ajuste / Erro *</label><input type="text" id="fl-reason" placeholder="Ex: Erro de digitação no cupom, valor alterado pelo fornecedor..."/></div>`:''}
    ${auditHistoryHtml}
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="_closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveCashflow('${type}', ${id})">Confirmar Lançamento</button>
    </div>
  `);
}

function saveCashflow(type, id){
  const desc = document.getElementById('fl-desc').value.trim();
  const val = parseFloat(document.getElementById('fl-value').value)||0;
  const date = document.getElementById('fl-date').value;
  
  if(!desc || val<=0) return toast('Preencha os campos obrigatórios corretamente','error');

  if(id){
    const item = state.cashflow.find(x=>x.id===id);
    const reason = document.getElementById('fl-reason').value.trim();
    if(!reason) return toast('Insira o motivo de alteração deste registro','error');

    if(!item.history) item.history = [];
    item.history.push({ ts: nowISO(), before: item.value, after: val, reason: reason });

    if(item.type==='in'){
      state.yearRevenue = state.yearRevenue - item.value + val;
    }
    item.desc = desc;
    item.value = val;
    item.date = date;
    toast('Lançamento editado e auditado!');
  }else{
    state.cashflow.push({
      id: state.cashflow.length ? Math.max(...state.cashflow.map(x=>x.id))+1 : 1,
      date: date, desc: desc, type: type, value: val, editable: true, history: []
    });
    if(type==='in') state.yearRevenue += val;
    toast('Lançamento inserido no livro caixa!');
  }
  _closeModal();
  renderPage('cashflow');
}

function deleteCashflow(id){
  if(!confirm('Deseja excluir este lançamento definitivo do livro caixa?'))return;
  const item = state.cashflow.find(x=>x.id===id);
  if(item && item.type==='in') state.yearRevenue -= item.value;
  state.cashflow = state.cashflow.filter(x=>x.id!==id);
  renderPage('cashflow');
  toast('Lançamento apagado!','error');
}

// ══════════════════════════════════════
// REPORTS
// ══════════════════════════════════════
function renderReports(el){
  const paid = state.sales.filter(s=>s.status==='paid');
  const revenue = paid.reduce((a,s)=>a+s.netTotal,0);
  const cost = paid.reduce((a,s)=>a+s.items.reduce((acc,i)=>acc+(i.cost*i.qty),0),0);
  const despesas = state.cashflow.filter(c=>c.type==='out').reduce((a,c)=>a+c.value,0);
  const lucroLiquido = revenue - despesas;

  el.innerHTML=`
    <div class="section-header"><span class="section-title">📈 Demonstrativo de Resultados Simplificado (DRE Mês)</span></div>
    <div class="card" style="max-width:500px">
      <div class="calc-row"><span>(+) Receita de Vendas / Serviços:</span><strong>${R(revenue)}</strong></div>
      <div class="calc-row" style="color:var(--muted)"><span>(-) Custo de Produtos Escoados:</span><strong>- ${R(cost)}</strong></div>
      <hr style="border:none;border-top:1px solid var(--border);margin:8px 0"/>
      <div class="calc-row"><span>(=) Lucro Bruto Operacional:</span><strong class="blue">${R(revenue - cost)}</strong></div>
      <div class="calc-row" style="color:var(--red)"><span>(-) Despesas Administrativas / Fixas:</span><strong>- ${R(despesas)}</strong></div>
      <div class="calc-box ${lucroLiquido>=0?'calc-green':''}">
        <div class="calc-row total"><span>(=) Resultado Líquido Final:</span><span style="color:var(--${lucroLiquido>=0?'green':'red'})">${R(lucroLiquido)}</span></div>
      </div>
    </div>
  `;
}

// SETTINGS
// ══════════════════════════════════════
function renderSettings(el){
  el.innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start">
      <div class="card">
        <div class="section-title" style="margin-bottom:16px">⚙️ Configurações das Taxas da Maquininha</div>
        <p style="font-size:12px;color:var(--muted);margin-bottom:14px">Configure as taxas cobradas pelas operadoras para dedução automática nas vendas.</p>
        ${Object.entries(PAY_METHODS).filter(([k,m])=>m.hasFee).map(([k,m])=>`
          <div class="form-group">
            <label>${m.icon} Taxa ${m.label} (%)</label>
            <input type="number" step="0.01" id="fee-${k}" value="${state.payFees[k]}"/>
          </div>`).join('')}
        <button class="btn btn-primary btn-sm" onclick="saveFeesConfig()">💾 Salvar taxas</button>
      </div>
      
      <div class="card" style="margin-bottom:16px">
        <div class="section-title" style="margin-bottom:16px">🔐 Segurança</div>
        <div class="form-group"><label>Senha atual</label><input type="password" placeholder="••••••••"/></div>
        <div class="form-group"><label>Nova senha</label><input type="password" placeholder="••••••••"/></div>
        <div class="form-group"><label>Confirmar nova senha</label><input type="password" placeholder="••••••••"/></div>
        <button class="btn btn-ghost" onclick="toast('Senha alterada com sucesso!')">🔑 Alterar Senha</button>
      </div>
    </div>
    
    <div class="card" style="background:var(--red-x);border:1px solid var(--red-l);margin-top:20px;max-width:400px">
      <div class="section-title" style="margin-bottom:8px;color:var(--red)">⚠️ Sair da conta</div>
      <p style="font-size:13px;color:var(--muted);margin-bottom:12px">Você será desconectado do sistema com segurança.</p>
      <button class="btn btn-danger btn-sm" onclick="logout()">Sair</button>
    </div>
  `;
}

function saveFeesConfig(){
  Object.keys(PAY_METHODS).filter(k=>PAY_METHODS[k].hasFee).forEach(k=>{
    const input=document.getElementById(`fee-${k}`);
    if(input) state.payFees[k] = parseFloat(input.value)||0;
  });
  toast('Taxas configuradas salvas! Aplicadas nas próximas vendas.');
}
</script>
